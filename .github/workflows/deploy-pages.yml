name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy spec into docs
        run: cp -r spec docs/

      - name: Copy agent discovery and .cursor into docs
        run: |
          mkdir -p docs/agents docs/agents/rules docs/agents/agents docs/agents/skills
          cp FOR_AGENTS.md AGENTS.md docs/agents/
          cp .cursorrules docs/agents/cursorrules
          cp -r .cursor/rules/* docs/agents/rules/
          cp -r .cursor/agents/* docs/agents/agents/
          cp -r .cursor/skills/* docs/agents/skills/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
