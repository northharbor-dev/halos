name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signatories
        run: node scripts/validate-signatories.js

      - name: Build HALOS image
        run: docker build -t halos .

      - name: Run integration tests
        run: |
          chmod +x scripts/integration-test.sh
          TEST_PORT=3999 ./scripts/integration-test.sh

  build:
    needs: integrate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy spec into docs
        run: cp -r spec docs/

      - name: Copy signatories into docs
        run: cp -r signatories docs/

      - name: Checkout halos-spec for examples
        uses: actions/checkout@v4
        with:
          repository: northharbor-dev/halos-spec
          path: halos-spec

      - name: Copy halos-spec examples into docs
        run: bash scripts/copy-halos-spec-examples.sh halos-spec

      - name: Copy agent discovery and .cursor into docs
        run: |
          mkdir -p docs/agents docs/agents/rules docs/agents/agents docs/agents/skills
          cp FOR_AGENTS.md AGENTS.md docs/agents/
          cp .cursorrules docs/agents/cursorrules
          cp -r .cursor/rules/* docs/agents/rules/
          cp -r .cursor/agents/* docs/agents/agents/
          cp -r .cursor/skills/* docs/agents/skills/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
