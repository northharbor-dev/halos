title: HALOS
description: Human–Agent Lineage and Origin Standard
url: "https://halos.northharbor.dev"
baseurl: ""  # empty for custom domain halos.northharbor.dev (served at root)
default_social_image: /identity-assets/profile/halos-linkedin-banner.png
default_feed_image: /identity-assets/profile/halos-profile-420.png
image_version: "20260401-2"
theme: minima
sass:
  quiet_deps: true
  silence_deprecations:
    - import
collections:
  journal:
    output: false
  examples:
    output: true
    permalink: /examples/:slug/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: posts
    values:
      image: /identity-assets/profile/halos-linkedin-banner.png
      feed_image: /identity-assets/profile/halos-profile-420.png
