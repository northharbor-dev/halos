<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HALOS AI">
  <defs>
    <linearGradient id="ai-bg" x1="48" y1="-15" x2="48" y2="111" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061228"/>
      <stop offset="1" stop-color="#020814"/>
    </linearGradient>
    <linearGradient id="ai-ring" x1="8.7" y1="14.2" x2="84" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5ACBFF"/>
      <stop offset="0.4" stop-color="#4070E8"/>
      <stop offset="1" stop-color="#2A45B8"/>
    </linearGradient>
    <filter id="ai-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="96" height="96" rx="11" fill="url(#ai-bg)"/>

  <!-- Hexagon node — centered, r=5; AI-dominant governance -->
  <polygon points="48,43 52.3,45.5 52.3,50.5 48,53 43.7,50.5 43.7,45.5"
    fill="#5ACBFF" filter="url(#ai-glow)" opacity="0.9"/>

  <!-- Inner thin ring -->
  <circle cx="48" cy="48" r="10.5" stroke="#5ACBFF" stroke-opacity="0.45" stroke-width="0.6"/>

  <!-- Main ring — fragmented dashes signal incomplete human governance -->
  <circle cx="48" cy="48" r="24" stroke="url(#ai-ring)" stroke-width="2.7" stroke-dasharray="25 10 8 10"/>

  <!-- Outer ring — more fragmented -->
  <circle cx="48" cy="48" r="35.5" stroke="url(#ai-ring)" stroke-opacity="0.75" stroke-width="2.2" stroke-dasharray="30 12 10 12"/>

  <!-- Ghost ring -->
  <circle cx="48" cy="48" r="46" stroke="#4070E8" stroke-opacity="0.22" stroke-width="0.7" stroke-dasharray="2.7 3.8"/>

  <!-- Star dots — bluer tint -->
  <g fill="#7BB8FF" filter="url(#ai-glow)">
    <circle cx="43.1" cy="24" r="1.3"/>
    <circle cx="64.9" cy="36" r="1.1"/>
    <circle cx="28.9" cy="57.8" r="1.1"/>
    <circle cx="55.6" cy="69.8" r="1.3"/>
    <circle cx="56.2" cy="10.4" r="1.3"/>
    <circle cx="18.5" cy="28.4" r="1.1"/>
    <circle cx="83.5" cy="42.5" r="1.3"/>
    <circle cx="68.2" cy="78" r="1.1"/>
    <circle cx="38.7" cy="85.1" r="1.3"/>
    <circle cx="10.9" cy="52.9" r="1.3"/>
    <circle cx="25.6" cy="74.7" r="1.1"/>
    <circle cx="88.4" cy="24.5" r="1"/>
    <circle cx="82.4" cy="71.5" r="1"/>
    <circle cx="6.5" cy="37.6" r="1"/>
  </g>
</svg>
