<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HALOS Human Only">
  <defs>
    <linearGradient id="hm-bg" x1="48" y1="-15" x2="48" y2="111" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061228"/>
      <stop offset="1" stop-color="#020814"/>
    </linearGradient>
    <linearGradient id="hm-ring" x1="8.7" y1="14.2" x2="84" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDFDFE"/>
      <stop offset="0.4" stop-color="#A5E5FF"/>
      <stop offset="1" stop-color="#78D3FF"/>
    </linearGradient>
    <filter id="hm-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="96" height="96" rx="11" fill="url(#hm-bg)"/>

  <!-- Person glyph — human only -->
  <g filter="url(#hm-glow)">
    <!-- Head -->
    <circle cx="48" cy="42" r="3" fill="#EDFDFE"/>
    <!-- Shoulders arc -->
    <path d="M42,54 Q48,50 54,54" stroke="#EDFDFE" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Inner thin ring -->
  <circle cx="48" cy="48" r="10.5" stroke="#A5E5FF" stroke-opacity="0.55" stroke-width="0.6"/>

  <!-- Main ring -->
  <circle cx="48" cy="48" r="24" stroke="url(#hm-ring)" stroke-width="2.7" stroke-dasharray="40 5.5 11.5 5.5"/>

  <!-- Outer ring -->
  <circle cx="48" cy="48" r="35.5" stroke="url(#hm-ring)" stroke-opacity="0.82" stroke-width="2.2" stroke-dasharray="52 6.5 16 6"/>

  <!-- Ghost ring -->
  <circle cx="48" cy="48" r="46" stroke="#A5E5FF" stroke-opacity="0.22" stroke-width="0.7" stroke-dasharray="2.7 3.8"/>

  <!-- Star dots -->
  <g fill="#E2FBFF" filter="url(#hm-glow)">
    <circle cx="43.1" cy="24" r="1.3"/>
    <circle cx="64.9" cy="36" r="1.1"/>
    <circle cx="28.9" cy="57.8" r="1.1"/>
    <circle cx="55.6" cy="69.8" r="1.3"/>
    <circle cx="56.2" cy="10.4" r="1.3"/>
    <circle cx="18.5" cy="28.4" r="1.1"/>
    <circle cx="83.5" cy="42.5" r="1.3"/>
    <circle cx="68.2" cy="78" r="1.1"/>
    <circle cx="38.7" cy="85.1" r="1.3"/>
    <circle cx="10.9" cy="52.9" r="1.3"/>
    <circle cx="25.6" cy="74.7" r="1.1"/>
    <circle cx="88.4" cy="24.5" r="1"/>
    <circle cx="82.4" cy="71.5" r="1"/>
    <circle cx="6.5" cy="37.6" r="1"/>
  </g>
</svg>
