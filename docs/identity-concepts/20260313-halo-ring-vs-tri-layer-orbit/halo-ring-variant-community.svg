  <circle cx="256" cy="256" r="134" stroke="url(#ring)" stroke-opacity="0.78" stroke-width="9" stroke-dasharray="108 18 34 18 64 20"/>
  <circle cx="256" cy="256" r="182" stroke="#60CEFF" stroke-opacity="0.28" stroke-width="3" stroke-dasharray="12 16"/>

  <g fill="#DDF9FF" filter="url(#glow)">
