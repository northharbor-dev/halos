<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="256" y1="24" x2="256" y2="488" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07142B"/>
      <stop offset="1" stop-color="#030A18"/>
    </linearGradient>
    <linearGradient id="ring" x1="108" y1="120" x2="404" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D1FBFF"/>
      <stop offset="0.42" stop-color="#6BD0FF"/>
      <stop offset="1" stop-color="#4562E3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <circle cx="256" cy="256" r="14" fill="#E7FBFF" filter="url(#glow)"/>
